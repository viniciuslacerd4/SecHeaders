<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#312e81" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Shield body — wider/chubbier -->
  <path
    d="M256 32
       C296 52 356 72 432 72
       C442 72 450 80 450 90
       L450 260
       C450 372 370 440 262 480
       C258 482 254 482 250 480
       C142 440 62 372 62 260
       L62 90
       C62 80 70 72 80 72
       C156 72 216 52 256 32 Z"
    fill="url(#shieldGrad)"
    filter="url(#shadow)"
  />

  <!-- Shield inner highlight -->
  <path
    d="M256 56
       C292 74 346 90 420 90
       C426 90 430 94 430 100
       L430 256
       C430 358 356 422 258 460
       C256 461 256 461 254 460
       C156 422 82 358 82 256
       L82 100
       C82 94 86 90 92 90
       C166 90 220 74 256 56 Z"
    fill="url(#innerGlow)"
  />

  <!-- Shield border -->
  <path
    d="M256 32
       C296 52 356 72 432 72
       C442 72 450 80 450 90
       L450 260
       C450 372 370 440 262 480
       C258 482 254 482 250 480
       C142 440 62 372 62 260
       L62 90
       C62 80 70 72 80 72
       C156 72 216 52 256 32 Z"
    fill="none"
    stroke="#a5b4fc"
    stroke-width="2"
    stroke-opacity="0.3"
  />

  <!-- Left bracket < -->
  <path
    d="M194 200 L128 260 L194 320"
    fill="none"
    stroke="url(#codeGrad)"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Slash / -->
  <path
    d="M280 180 L232 340"
    fill="none"
    stroke="#e0e7ff"
    stroke-width="20"
    stroke-linecap="round"
    stroke-opacity="0.7"
  />

  <!-- Right bracket > -->
  <path
    d="M318 200 L384 260 L318 320"
    fill="none"
    stroke="url(#codeGrad)"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
